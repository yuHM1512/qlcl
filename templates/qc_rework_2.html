<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tái chế lỗi (Sản phẩm)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafb; --border: #e2e8f0; }
        body { background: var(--bg); font-family: 'Roboto', 'Inter', system-ui, sans-serif; padding-bottom: 90px; }
        .mobile-container { max-width: 860px; margin: 0 auto; padding: 1.25rem; }
        .glass-header { position: sticky; top: 0; background: #f8fafb; border-bottom: 1px solid var(--border); z-index: 1000; padding: 1rem 1.25rem; margin: -1.25rem -1.25rem 1.5rem -1.25rem; display: flex; align-items: center; justify-content: space-between; }
        .header-title { font-weight: 800; font-size: 1.05rem; color: var(--primary); margin: 0; }
        .card-lite { background: #fff; border: 1px solid var(--border); border-radius: 14px; padding: 1rem; box-shadow: 0 6px 16px rgba(15, 23, 42, 0.05); }
        .rework-card { border-radius: 16px; border: 1px solid #e2e8f0; padding: 1rem; display: flex; flex-direction: column; gap: 0.65rem; }
        .rework-card.pending { background: #fff1f2; border-color: #fecdd3; }
        .rework-card.done { background: #ecfdf3; border-color: #bbf7d0; }
        .sp-tag { font-weight: 800; color: #0f172a; background: #e0e7ff; padding: 4px 10px; border-radius: 999px; font-size: 0.8rem; }
        .status-pill { font-weight: 700; border-radius: 999px; padding: 4px 10px; font-size: 0.75rem; }
        .status-pending { background: #fee2e2; color: #991b1b; }
        .status-ok { background: #dcfce7; color: #166534; }
        .meta-grid { display: grid; grid-template-columns: 90px 1fr; row-gap: 6px; column-gap: 10px; font-size: 0.9rem; }
        .meta-label { color: #64748b; font-weight: 700; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.04em; }
        .defect-list { display: flex; flex-direction: column; gap: 6px; }
        .defect-item { background: #fff; border: 1px dashed #cbd5f5; border-radius: 10px; padding: 0.5rem 0.65rem; font-size: 0.9rem; }
        .action-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .btn-verify { border-radius: 999px; font-weight: 700; }
    </style>
</head>
<body>
<div class="mobile-container">
    <div class="glass-header">
        <a href="/qc-input-2" class="text-secondary"><i class="fas fa-arrow-left fa-lg"></i></a>
        <h1 class="header-title">TÁI CHẾ LỖI (SP)</h1>
        <button onclick="logout()" class="btn btn-sm text-danger" title="Đăng xuất"><i class="fas fa-sign-out-alt fa-lg"></i></button>
    </div>

    <div class="card-lite d-flex align-items-center justify-content-between mb-3">
        <div class="fw-bold text-muted" style="font-size: 0.9rem;">CHỌN NGÀY</div>
        <div>
            <input type="date" id="dateFilter" class="form-control" style="background: #f1f5f9; border: none; font-weight: bold; color: var(--primary)" onchange="fetchReworkData()">
        </div>
    </div>

    <div id="reworkDataArea">
        <div class="text-center text-muted my-5" id="loadingMsg">
            <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
            <p>Đang tải dữ liệu...</p>
        </div>
    </div>
</div>

<script>
    async function logout() {
        try {
            const res = await fetch('/logout', { method: 'POST' });
            if (res.redirected) window.location.href = res.url;
            else window.location.href = '/login';
        } catch (e) {
            window.location.href = '/login';
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date();
        const y = today.getFullYear();
        const m = String(today.getMonth() + 1).padStart(2, '0');
        const d = String(today.getDate()).padStart(2, '0');
        document.getElementById('dateFilter').value = `${y}-${m}-${d}`;
        fetchReworkData();
    });

    async function fetchReworkData() {
        const dateStr = document.getElementById('dateFilter').value;
        const container = document.getElementById('reworkDataArea');
        container.innerHTML = `
            <div class="text-center text-muted my-5">
                <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
                <p>Đang tải dữ liệu...</p>
            </div>
        `;

        try {
            const res = await fetch(`/api/qc/rework-2?date_str=${dateStr}`);
            if (!res.ok) throw new Error('API Error');
            const data = await res.json();
            renderData(data.rows || []);
        } catch (e) {
            console.error(e);
            container.innerHTML = `
                <div class="text-center text-danger my-5">
                    <i class="fas fa-exclamation-triangle fa-2x mb-3"></i>
                    <p>Lỗi tải dữ liệu. Vui lòng thử lại.</p>
                </div>
            `;
        }
    }

    function formatSpIndex(index) {
        if (!index && index !== 0) return '--';
        return String(index).padStart(2, '0');
    }

    function renderData(rows) {
        const container = document.getElementById('reworkDataArea');
        container.innerHTML = '';

        if (!rows || rows.length === 0) {
            container.innerHTML = `
                <div class="text-center my-5 p-4 bg-white rounded shadow-sm border">
                    <i class="fas fa-check-circle fa-3x text-success mb-3 opacity-75"></i>
                    <h6 class="text-muted fw-bold">KHÔNG CÓ LỖI NÀO TRONG NGÀY</h6>
                    <p class="small text-muted mb-0">Tuyệt vời! Không có sản phẩm lỗi cần tái chế.</p>
                </div>
            `;
            return;
        }

        const list = document.createElement('div');
        list.className = 'd-flex flex-column gap-3';

        rows.forEach(r => {
            const done = !!r.rework_done;
            const card = document.createElement('div');
            card.className = `rework-card ${done ? 'done' : 'pending'}`;
            card.id = `row-${r.error_log_sp_id}-${r.sp_index}`;

            const statusHtml = done
                ? `<span class="status-pill status-ok">Đã sửa</span>`
                : `<span class="status-pill status-pending">Chưa sửa</span>`;

            const btnHtml = done
                ? `<button class="btn btn-sm btn-outline-secondary btn-verify" onclick="updateRework(${r.error_log_sp_id}, ${r.sp_index}, false)"><i class="fas fa-undo me-1"></i> Hoàn tác</button>`
                : `<button class="btn btn-sm btn-success btn-verify" onclick="updateRework(${r.error_log_sp_id}, ${r.sp_index}, true)"><i class="fas fa-check me-1"></i> Xác nhận</button>`;

            const defects = (r.defect_list || []).filter(Boolean);
            const defectHtml = defects.length
                ? defects.map(d => `<div class="defect-item">${d}</div>`).join('')
                : `<div class="defect-item text-muted">Chưa có mô tả lỗi.</div>`;

            card.innerHTML = `
                <div class="action-row">
                    <span class="sp-tag">#SP${formatSpIndex(r.sp_index)}</span>
                    ${statusHtml}
                </div>
                <div class="meta-grid">
                    <div class="meta-label">ID</div>
                    <div><strong>${r.error_log_sp_id}</strong></div>
                    <div class="meta-label">Kế hoạch</div>
                    <div><strong>${r.ke_hoach || '--'}</strong></div>
                    <div class="meta-label">Mã hàng</div>
                    <div>${r.ma_hang || '--'}</div>
                    <div class="meta-label">Lỗi</div>
                    <div class="defect-list">${defectHtml}</div>
                </div>
                <div class="action-row">
                    <div class="text-muted small">Tổng lỗi: <strong>${r.defect_items || 0}</strong></div>
                    ${btnHtml}
                </div>
            `;

            list.appendChild(card);
        });

        container.appendChild(list);
    }

    async function updateRework(logId, spIndex, done) {
        try {
            const res = await fetch(`/api/qc/rework-2/${logId}/${spIndex}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rework_done: done })
            });
            if (!res.ok) throw new Error('Update failed');
            await fetchReworkData();
        } catch (e) {
            console.error(e);
            alert('Lỗi khi cập nhật trạng thái tái chế.');
        }
    }
</script>
</body>
</html>
