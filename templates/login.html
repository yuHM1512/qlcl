<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - KPI QLCL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container min-vh-100 d-flex align-items-center justify-content-center">
        <div class="card shadow" style="max-width: 420px; width: 100%;">
            <div class="text-center p-4">
                <img src="/templates/Logo.png" alt="Logo" class="img-fluid" style="max-height: 120px;">
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger" role="alert">{{ error }}</div>
                {% endif %}
                <div class="mb-3">
                    <input type="text" class="form-control" id="loginEmployeeCode" placeholder="Nhập mã nhân viên (ví dụ: T0154)">
                </div>
                <button class="btn btn-primary w-100" onclick="doLogin()">
                    <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
                </button>
                <div class="text-center mt-3">
                    <small class="text-muted">Sử dụng mã nhân viên đã được cấp trong hệ thống</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function doLogin() {
            const code = document.getElementById('loginEmployeeCode').value.trim().toUpperCase();
            if (!code) {
                alert('Vui lòng nhập mã nhân viên');
                return;
            }
            try {
                const formData = new FormData();
                formData.append('ma_nv', code);
                const endpoint = '{{ "/qc-login" if qc_mode else "/login" }}';
                const redirectUrl = '{{ "/qc-input" if qc_mode else "/kpi-input" }}';
                const res = await fetch(endpoint, { method: 'POST', body: formData });
                if (res.redirected) {
                    window.location.href = res.url;
                    return;
                }
                if (res.ok) {
                    window.location.href = redirectUrl;
                } else {
                    const errText = await res.text();
                    alert('Đăng nhập thất bại');
                }
            } catch (e) {
                alert('Đăng nhập thất bại');
            }
        }
    </script>
</body>
</html>
