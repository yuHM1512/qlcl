<!DOCTYPE html>
<html class="light" lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{{ app_name }}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "surface-container": "#eceeef",
              "surface-container-low": "#f1f3f4",
              "surface-container-lowest": "#ffffff",
              "surface-variant": "#eeeeee",
              "on-surface": "#191c1d",
              "on-surface-variant": "#424654",
              primary: "#002b73",
              "primary-container": "#0056d2",
            },
            fontFamily: {
              manrope: ["Manrope"],
              inter: ["Inter"],
            },
          },
        },
      };
    </script>
    <style>
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-[#f8f9fa] font-inter text-on-surface">
    <header class="relative overflow-hidden">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(0,86,210,0.24),transparent_28%),linear-gradient(135deg,#194d90_0%,#0e315b_100%)]"></div>
      <div class="absolute inset-0 opacity-30 [background-image:linear-gradient(rgba(255,255,255,0.08)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.08)_1px,transparent_1px)] [background-size:32px_32px]"></div>
      <div class="relative mx-auto flex w-full max-w-[1600px] flex-col gap-8 px-4 py-6 md:px-10 xl:px-16">
        <div class="grid gap-5 lg:grid-cols-[260px_1fr_400px] lg:items-center">
          <div class="flex h-[88px] w-[220px] items-center justify-center rounded-2xl bg-white p-4 shadow-[0px_20px_40px_rgba(25,28,29,0.18)]">
            <img src="/static/Marex.png" alt="Marex Project" class="block h-full w-full object-contain" />
          </div>

          <div class="rounded-2xl bg-white/10 px-6 py-5 backdrop-blur-xl">
            <div class="text-[10px] uppercase tracking-[0.28em] text-white/70">Realtime dashboard</div>
            <h1 class="mt-2 font-manrope text-2xl font-black text-white md:text-4xl">
              DASHBOARD GEMBA CONTROL PLAN
            </h1>
          </div>

          <div class="rounded-2xl bg-white/10 px-5 py-4 backdrop-blur-xl">
            <div class="flex items-center gap-2">
              <button
                id="dimensionMonth"
                type="button"
                class="rounded-xl bg-white/10 px-4 py-2 text-sm font-semibold text-white transition"
              >
                Tháng
              </button>
              <button
                id="dimensionUnit"
                type="button"
                class="rounded-xl bg-white px-4 py-2 text-sm font-semibold text-primary shadow-[0px_8px_20px_rgba(25,28,29,0.1)] transition"
              >
                Đơn vị
              </button>
              <button
                id="syncButton"
                title="Đồng bộ từ Sheet"
                class="ml-auto flex items-center gap-1.5 rounded-xl bg-white px-3 py-2 text-sm font-bold text-primary shadow-[0px_8px_24px_rgba(0,43,115,0.25)] transition hover:opacity-90 active:scale-95"
              >
                <svg
                  id="syncIcon"
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-4 w-4 shrink-0"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M3 12a9 9 0 0 1 15-6.7L21 8M3 16l3 3a9 9 0 0 0 15-7" />
                </svg>
                <span>Đồng bộ</span>
              </button>
            </div>

            <div class="mt-3 grid grid-cols-3 gap-3">
              <label class="block">
                <span class="text-[11px] font-semibold text-white/80">Năm</span>
                <select
                  id="yearFilter"
                  class="mt-1 w-full rounded-xl border-white/20 bg-[#1f4f86]/70 py-1.5 text-sm text-white"
                >
                  <option value="">All</option>
                </select>
              </label>
              <label class="block">
                <span class="text-[11px] font-semibold text-white/80">Tháng</span>
                <select
                  id="monthFilter"
                  class="mt-1 w-full rounded-xl border-white/20 bg-[#1f4f86]/70 py-1.5 text-sm text-white"
                >
                  <option value="">All</option>
                </select>
              </label>
              <label id="unitFilterWrap" class="block">
                <span class="text-[11px] font-semibold text-white/80">Đơn vị</span>
                <select
                  id="unitFilter"
                  class="mt-1 w-full rounded-xl border-white/20 bg-[#1f4f86]/70 py-1.5 text-sm text-white"
                >
                  <option value="">All</option>
                </select>
              </label>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="mx-auto w-full max-w-[1600px] px-4 py-8 md:px-10 xl:px-16">
      <section class="flex flex-col gap-4">
        <div class="flex flex-wrap items-center justify-between gap-3 rounded-[1.75rem] bg-white px-5 py-4 shadow-[0px_20px_40px_rgba(25,28,29,0.05)]">
          <div>
            <div class="text-[10px] font-black uppercase tracking-[0.28em] text-on-surface-variant">KPI chính</div>
            <h2 class="mt-1 font-manrope text-xl font-extrabold text-on-surface">Tổng quan Gemba Control Plan</h2>
          </div>
          <div class="inline-flex rounded-2xl bg-slate-100 p-1">
            <button
              id="kpiScopeRecent"
              type="button"
              class="rounded-xl bg-white px-4 py-2 text-sm font-semibold text-primary shadow-[0px_8px_20px_rgba(25,28,29,0.08)] transition"
            >
              4 tuần gần nhất
            </button>
            <button
              id="kpiScopeAll"
              type="button"
              class="rounded-xl px-4 py-2 text-sm font-semibold text-on-surface-variant transition"
            >
              Tất cả
            </button>
          </div>
        </div>

        <section id="kpiCards" class="grid gap-6 md:grid-cols-2 2xl:grid-cols-3"></section>
      </section>

      <section class="mt-6 grid gap-6 xl:grid-cols-2">
        <div id="ncrChart"></div>
        <div id="onTimeChart"></div>
        <div id="capChart"></div>
        <div id="planCreateOnTimeChart"></div>
      </section>
    </main>

    <script src="/static/dashboard.js?v={{ dashboard_js_version }}"></script>
  </body>
</html>
